name: Build ExamBro Desktop (Windows EXE)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'Emes Exam Browser'
      app_title:
        description: 'Judul di Splash Screen'
        required: true
        default: 'Emes Exam Browser'
      app_description:
        description: 'Subtitle'
        required: true
        default: 'Safe browsing untuk ujian online'
      exit_pin:
        description: 'PIN Pengawas untuk keluar'
        required: true
        default: '1234'
      header_color:
        description: 'Warna Header (hex tanpa #)'
        required: true
        default: '1A3A5C'
      button_color:
        description: 'Warna Tombol (hex tanpa #)'
        required: true
        default: '2E7BF6'
      package_id:
        description: 'App ID (contoh: id.sekolah.exambrowser)'
        required: true
        default: 'id.emes.exambrowser'
      version_name:
        description: 'Versi (contoh: 1.2.0)'
        required: true
        default: '1.1.0'

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Apply desktop configuration
        env:
          APP_NAME:        ${{ github.event.inputs.app_name }}
          APP_TITLE:       ${{ github.event.inputs.app_title }}
          APP_DESCRIPTION: ${{ github.event.inputs.app_description }}
          EXIT_PIN:        ${{ github.event.inputs.exit_pin }}
          HEADER_COLOR:    ${{ github.event.inputs.header_color }}
          BUTTON_COLOR:    ${{ github.event.inputs.button_color }}
          PACKAGE_ID:      ${{ github.event.inputs.package_id }}
          VERSION_NAME:    ${{ github.event.inputs.version_name }}
        run: python scripts/apply_config_desktop.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows EXE
        working-directory: desktop
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename EXE
        shell: pwsh
        run: |
          $app = "${{ github.event.inputs.app_name }}"
          $ver = "${{ github.event.inputs.version_name }}"
          $safe = $app -replace '[^a-zA-Z0-9]', '-'
          $src = Get-ChildItem -Path "desktop/dist" -Filter "*.exe" | Select-Object -First 1
          if ($src) {
            Rename-Item $src.FullName "${safe}-v${ver}-setup.exe"
            Write-Host "✅ Renamed to ${safe}-v${ver}-setup.exe"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExamBro-Desktop-Windows
          path: desktop/dist/*.exe
          retention-days: 30

      - name: Show info
        run: |
          echo "✅ Build selesai!"
          echo "📦 EXE tersedia di tab Actions > Artifacts > ExamBro-Desktop-Windows"
