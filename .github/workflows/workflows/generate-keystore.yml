name: Generate Keystore (Jalankan Sekali Saja)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key Alias (bebas, contoh: emes)'
        required: true
        default: 'emes'
      key_password:
        description: 'Password Key (min 6 karakter)'
        required: true
        default: 'emes123456'
      store_password:
        description: 'Password Store (min 6 karakter)'
        required: true
        default: 'emes123456'
      organization:
        description: 'Nama Organisasi (contoh: EMES Edu Tech)'
        required: true
        default: 'EMES Edu Tech'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.organization }}, OU=Android, O=${{ github.event.inputs.organization }}, L=Indonesia, ST=Indonesia, C=ID"

      - name: Print Keystore as Base64
        run: |
          echo "================================================"
          echo "✅ KEYSTORE BERHASIL DIBUAT!"
          echo "================================================"
          echo ""
          echo "Salin nilai di bawah ini ke GitHub Secrets"
          echo "dengan nama: KEYSTORE_BASE64"
          echo ""
          echo "--- MULAI COPY DARI BARIS BERIKUTNYA ---"
          base64 -w 0 release.jks
          echo ""
          echo "--- SELESAI COPY SAMPAI BARIS DI ATAS ---"
          echo ""
          echo "================================================"
          echo "Secrets yang perlu ditambahkan ke repo:"
          echo "================================================"
          echo "KEYSTORE_BASE64  = (base64 di atas)"
          echo "KEY_ALIAS        = ${{ github.event.inputs.key_alias }}"
          echo "KEY_PASSWORD     = ${{ github.event.inputs.key_password }}"
          echo "STORE_PASSWORD   = ${{ github.event.inputs.store_password }}"
          echo "================================================"
