<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Emes Exam Browser</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: CONFIG_HEADER_COLOR;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    user-select: none;
    -webkit-app-region: drag;
  }
  .logo {
    width: 100px; height: 100px;
    object-fit: contain;
    margin-bottom: 20px;
    -webkit-app-region: no-drag;
  }
  .logo-placeholder {
    width: 100px; height: 100px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 22px; font-weight: 700;
    text-align: center; margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px; color: rgba(255,255,255,0.7);
    text-align: center; margin-bottom: 32px;
  }
  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: CONFIG_BUTTON_COLOR;
    margin-bottom: 32px;
  }
  .input-group {
    width: 100%;
    -webkit-app-region: no-drag;
  }
  label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    display: block;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 13px;
    outline: none;
    font-family: monospace;
    margin-bottom: 12px;
  }
  input::placeholder { color: rgba(255,255,255,0.4); }
  input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: CONFIG_BUTTON_COLOR;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.99); }
  .version {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
  }
  .err {
    color: #FCA5A5;
    font-size: 12px;
    margin-top: -8px;
    margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>
<div id="logoWrap">
  <div class="logo-placeholder">🎓</div>
</div>
<h1 id="appTitle">Emes Exam Browser</h1>
<p class="subtitle" id="appSubtitle">Safe browsing untuk ujian online</p>
<div class="badge">🛡 SECURE EXAM MODE</div>

<div class="input-group">
  <label>URL UJIAN</label>
  <input id="urlInput" type="url"
    placeholder="https://ujian.sekolah.id/..."
    autocomplete="off" spellcheck="false"/>
  <div class="err" id="errMsg">Masukkan URL ujian yang valid</div>
  <button id="startBtn" onclick="startExam()">Mulai Ujian</button>
</div>

<div class="version" id="versionText">v1.1.0</div>

<script>
const { ipcRenderer } = require('electron');
const fs = require('fs');
const path = require('path');

// Load config
const configPath = path.join(__dirname, '..', 'config.json');
const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));

// Apply config
document.getElementById('appTitle').textContent = config.appTitle || config.appName;
document.getElementById('appSubtitle').textContent = config.appDescription;
document.getElementById('versionText').textContent = 'v' + config.version;

// Load logo jika ada
const logoPath = path.join(__dirname, '..', 'assets', 'logo.png');
if (fs.existsSync(logoPath)) {
  const logoWrap = document.getElementById('logoWrap');
  logoWrap.innerHTML = `<img class="logo" src="${logoPath}" alt="Logo"/>`;
}

function startExam() {
  const url = document.getElementById('urlInput').value.trim();
  const err = document.getElementById('errMsg');

  if (!url) {
    err.textContent = 'Masukkan URL ujian terlebih dahulu';
    err.style.display = 'block';
    return;
  }

  let finalUrl = url;
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    finalUrl = 'https://' + url;
  }

  try {
    new URL(finalUrl);
  } catch(e) {
    err.textContent = 'URL tidak valid';
    err.style.display = 'block';
    return;
  }

  err.style.display = 'none';
  document.getElementById('startBtn').textContent = 'Memulai...';
  document.getElementById('startBtn').disabled = true;

  ipcRenderer.send('start-exam', finalUrl);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startExam();
});
</script>
</body>
</html>
