plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace "id.emes.exambrowser"

    defaultConfig {
        applicationId "id.emes.exambrowser"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1.0"
    }

    signingConfigs {
        release {
            def ksFile = file("keystore.jks")
            if (ksFile.exists()) {
                storeFile     ksFile
                storePassword System.getenv("STORE_PASSWORD") ?: ""
                keyAlias      System.getenv("KEY_ALIAS") ?: ""
                keyPassword   System.getenv("KEY_PASSWORD") ?: ""
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            // Disable PNG crunching agar alpha channel pada PNG transparan tidak hilang saat build APK
            crunchPngs false
            // Hanya gunakan release signing jika keystore tersedia
            if (file("keystore.jks").exists()) {
                signingConfig signingConfigs.release
            }
        }
        debug {
            crunchPngs false
        }
    }

    aaptOptions {
        // Jangan kompres PNG agar transparansi tetap terjaga
        cruncherEnabled false
        noCompress 'png'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'com.google.zxing:core:3.5.3'
}
